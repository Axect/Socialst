# ==============================================================================
# tmux config — zellij keybinding parity + Claude Code notifications
# Mirrors ~/Socialst/Zellij/config.kdl (tokyo-night-dark theme)
# ==============================================================================

# ---------- General ----------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,xterm-ghostty:Tc"
set -g default-shell "/usr/bin/fish"
set -g mouse on
set -g history-limit 100000
set -g escape-time 0
set -g focus-events on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g status-keys vi
setw -g mode-keys vi
set -g detach-on-destroy off
set -g set-titles on
set -g set-titles-string "#S:#I.#P #W"
set -g allow-rename off

# Prefix: keep default C-b (matches the muscle memory of zellij's "tmux mode")
unbind C-b
set -g prefix C-b
bind C-b send-prefix

# Reload config
bind R source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# ==============================================================================
# Direct Alt bindings (no prefix) — matches zellij "normal" mode
# ==============================================================================
bind -n M-n split-window -h -c "#{pane_current_path}"

bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
bind -n M-Left  select-pane -L
bind -n M-Down  select-pane -D
bind -n M-Up    select-pane -U
bind -n M-Right select-pane -R

# Resize: zellij "Increase" grows toward most-room direction; approximate w/ R+U
bind -n 'M-=' resize-pane -R 3 \; resize-pane -U 1
bind -n 'M-+' resize-pane -R 3 \; resize-pane -U 1
bind -n 'M--' resize-pane -L 3 \; resize-pane -D 1

# Tab jumps Alt-1..8 (zellij windows == tmux windows)
bind -n M-1 select-window -t :=1
bind -n M-2 select-window -t :=2
bind -n M-3 select-window -t :=3
bind -n M-4 select-window -t :=4
bind -n M-5 select-window -t :=5
bind -n M-6 select-window -t :=6
bind -n M-7 select-window -t :=7
bind -n M-8 select-window -t :=8

# ==============================================================================
# Mode entries (Ctrl-* enters a sticky keytable)
# ==============================================================================
bind -n C-p switch-client -T pane_mode
bind -n C-t switch-client -T tab_mode
bind -n C-n switch-client -T resize_mode
bind -n C-o switch-client -T session_mode
bind -n C-y switch-client -T move_mode      # zellij used C-h, but C-h conflicts with backspace in many terminals
bind -n C-s copy-mode                        # tmux's copy-mode == zellij scroll mode

# Quit guard (zellij C-q quits whole session; here we ask first)
bind -n C-q confirm-before -p "kill tmux session #S? (y/n)" kill-session

# ==============================================================================
# pane_mode — zellij `pane` block
# Sticky for navigation, one-shot for actions (matches zellij behavior)
# ==============================================================================
bind -T pane_mode h     select-pane -L \; switch-client -T pane_mode
bind -T pane_mode j     select-pane -D \; switch-client -T pane_mode
bind -T pane_mode k     select-pane -U \; switch-client -T pane_mode
bind -T pane_mode l     select-pane -R \; switch-client -T pane_mode
bind -T pane_mode Left  select-pane -L \; switch-client -T pane_mode
bind -T pane_mode Down  select-pane -D \; switch-client -T pane_mode
bind -T pane_mode Up    select-pane -U \; switch-client -T pane_mode
bind -T pane_mode Right select-pane -R \; switch-client -T pane_mode
bind -T pane_mode p     select-pane -t :.+ \; switch-client -T pane_mode

# One-shot actions
bind -T pane_mode n split-window -h -c "#{pane_current_path}"
bind -T pane_mode d split-window -v -c "#{pane_current_path}"
bind -T pane_mode r split-window -h -c "#{pane_current_path}"
bind -T pane_mode x kill-pane
bind -T pane_mode f resize-pane -Z
bind -T pane_mode z set -gw pane-border-status \; set -gw pane-border-status off  # toggle frame approximation
bind -T pane_mode w display-popup -E -w 80% -h 80% -d "#{pane_current_path}"     # floating popup
bind -T pane_mode e break-pane                                                    # embed/float toggle approximation
bind -T pane_mode c command-prompt -p "Pane name:" "select-pane -T '%%'"

# Same Alt-* bindings work inside the mode
bind -T pane_mode M-n split-window -h -c "#{pane_current_path}"
bind -T pane_mode M-h select-pane -L
bind -T pane_mode M-j select-pane -D
bind -T pane_mode M-k select-pane -U
bind -T pane_mode M-l select-pane -R

# Mode exits
bind -T pane_mode C-p   switch-client -T root
bind -T pane_mode Enter switch-client -T root
bind -T pane_mode Space switch-client -T root
bind -T pane_mode Escape switch-client -T root

# Cross-mode jumps
bind -T pane_mode C-n switch-client -T resize_mode
bind -T pane_mode C-t switch-client -T tab_mode
bind -T pane_mode C-o switch-client -T session_mode
bind -T pane_mode C-y switch-client -T move_mode
bind -T pane_mode C-s copy-mode

# ==============================================================================
# tab_mode — zellij `tab` block (tabs == tmux windows)
# ==============================================================================
bind -T tab_mode n new-window -c "#{pane_current_path}"
bind -T tab_mode x kill-window
bind -T tab_mode r command-prompt -p "Tab name:" "rename-window '%%'"
bind -T tab_mode s set-window-option synchronize-panes
bind -T tab_mode Tab last-window

bind -T tab_mode h previous-window \; switch-client -T tab_mode
bind -T tab_mode k previous-window \; switch-client -T tab_mode
bind -T tab_mode Left previous-window \; switch-client -T tab_mode
bind -T tab_mode Up   previous-window \; switch-client -T tab_mode
bind -T tab_mode l next-window \; switch-client -T tab_mode
bind -T tab_mode j next-window \; switch-client -T tab_mode
bind -T tab_mode Right next-window \; switch-client -T tab_mode
bind -T tab_mode Down  next-window \; switch-client -T tab_mode

bind -T tab_mode 1 select-window -t :=1
bind -T tab_mode 2 select-window -t :=2
bind -T tab_mode 3 select-window -t :=3
bind -T tab_mode 4 select-window -t :=4
bind -T tab_mode 5 select-window -t :=5
bind -T tab_mode 6 select-window -t :=6
bind -T tab_mode 7 select-window -t :=7
bind -T tab_mode 8 select-window -t :=8
bind -T tab_mode 9 select-window -t :=9

bind -T tab_mode C-t   switch-client -T root
bind -T tab_mode Enter switch-client -T root
bind -T tab_mode Space switch-client -T root
bind -T tab_mode Escape switch-client -T root

bind -T tab_mode C-p switch-client -T pane_mode
bind -T tab_mode C-n switch-client -T resize_mode
bind -T tab_mode C-o switch-client -T session_mode
bind -T tab_mode C-y switch-client -T move_mode
bind -T tab_mode C-s copy-mode

# ==============================================================================
# resize_mode — zellij `resize` block
# ==============================================================================
bind -T resize_mode h     resize-pane -L 2 \; switch-client -T resize_mode
bind -T resize_mode j     resize-pane -D 2 \; switch-client -T resize_mode
bind -T resize_mode k     resize-pane -U 2 \; switch-client -T resize_mode
bind -T resize_mode l     resize-pane -R 2 \; switch-client -T resize_mode
bind -T resize_mode Left  resize-pane -L 2 \; switch-client -T resize_mode
bind -T resize_mode Down  resize-pane -D 2 \; switch-client -T resize_mode
bind -T resize_mode Up    resize-pane -U 2 \; switch-client -T resize_mode
bind -T resize_mode Right resize-pane -R 2 \; switch-client -T resize_mode
bind -T resize_mode '='   resize-pane -R 3 \; resize-pane -U 1 \; switch-client -T resize_mode
bind -T resize_mode '+'   resize-pane -R 3 \; resize-pane -U 1 \; switch-client -T resize_mode
bind -T resize_mode '-'   resize-pane -L 3 \; resize-pane -D 1 \; switch-client -T resize_mode

bind -T resize_mode C-n   switch-client -T root
bind -T resize_mode Enter switch-client -T root
bind -T resize_mode Space switch-client -T root
bind -T resize_mode Escape switch-client -T root

bind -T resize_mode C-p switch-client -T pane_mode
bind -T resize_mode C-t switch-client -T tab_mode
bind -T resize_mode C-o switch-client -T session_mode
bind -T resize_mode C-y switch-client -T move_mode
bind -T resize_mode C-s copy-mode

# ==============================================================================
# move_mode — zellij `move` block (swap panes)
# Note: zellij used C-h for this; remapped to C-y (C-h conflicts with backspace)
# ==============================================================================
bind -T move_mode h swap-pane -s '{left-of}'
bind -T move_mode j swap-pane -D
bind -T move_mode k swap-pane -U
bind -T move_mode l swap-pane -s '{right-of}'
bind -T move_mode n rotate-window
bind -T move_mode Tab rotate-window

bind -T move_mode C-y   switch-client -T root
bind -T move_mode Enter switch-client -T root
bind -T move_mode Space switch-client -T root
bind -T move_mode Escape switch-client -T root

bind -T move_mode C-p switch-client -T pane_mode
bind -T move_mode C-t switch-client -T tab_mode
bind -T move_mode C-n switch-client -T resize_mode
bind -T move_mode C-o switch-client -T session_mode
bind -T move_mode C-s copy-mode

# ==============================================================================
# session_mode — zellij `session` block
# ==============================================================================
bind -T session_mode d detach-client
bind -T session_mode w choose-tree -Zs

bind -T session_mode C-o   switch-client -T root
bind -T session_mode Enter switch-client -T root
bind -T session_mode Space switch-client -T root
bind -T session_mode Escape switch-client -T root

bind -T session_mode C-p switch-client -T pane_mode
bind -T session_mode C-t switch-client -T tab_mode
bind -T session_mode C-n switch-client -T resize_mode
bind -T session_mode C-y switch-client -T move_mode
bind -T session_mode C-s copy-mode

# ==============================================================================
# Claude Code notifications
# ==============================================================================
# Bell from CC's hook script propagates here. monitor-bell flags the window
# with `!` in the status bar AND fires alert-bell hook → desktop notification.
set -g monitor-bell on
set -g visual-bell off
set -g bell-action other

# Activity = sub-bell signal (CC Stop hook). Not as loud.
setw -g monitor-activity on
set -g visual-activity off
set -g activity-action other

set-hook -g alert-bell     'run-shell "notify-send -u critical -i utilities-terminal -a tmux \"Claude Code\" \"⚠ needs input — #{session_name}:#{window_index} #{window_name}\""'
set-hook -g alert-activity 'run-shell "notify-send -u normal   -i utilities-terminal -a tmux \"Claude Code\" \"✓ done — #{session_name}:#{window_index} #{window_name}\""'

# ==============================================================================
# Theme — tokyo-night-dark approximation
# ==============================================================================
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 5

set -g status-style "bg=#1a1b26,fg=#a9b1d6"
set -g status-left  "#[fg=#1a1b26,bg=#7aa2f7,bold] #S #[fg=#7aa2f7,bg=#1a1b26]"
set -g status-left-length 40
set -g status-right-length 120

setw -g window-status-format         "#[fg=#a9b1d6,bg=#1a1b26] #I:#W#{?window_bell_flag,#[fg=#f7768e]!,}#{?window_activity_flag,#[fg=#9ece6a]·,} "
setw -g window-status-current-format "#[fg=#1a1b26,bg=#bb9af7]#[fg=#1a1b26,bg=#bb9af7,bold] #I:#W #[fg=#bb9af7,bg=#1a1b26]"
setw -g window-status-bell-style       "fg=#f7768e,bold"
setw -g window-status-activity-style   "fg=#9ece6a,bold"

set -g pane-border-style        "fg=#414868"
set -g pane-active-border-style "fg=#7aa2f7"

set -g message-style         "fg=#1a1b26,bg=#7aa2f7,bold"
set -g message-command-style "fg=#1a1b26,bg=#bb9af7,bold"

set -g mode-style "fg=#1a1b26,bg=#7aa2f7,bold"

# Mode indicator (right side)
set -g status-right "#{?#{==:#{client_key_table},pane_mode},#[fg=#1a1b26 bg=#7aa2f7 bold] PANE ,}#{?#{==:#{client_key_table},tab_mode},#[fg=#1a1b26 bg=#bb9af7 bold] TAB ,}#{?#{==:#{client_key_table},resize_mode},#[fg=#1a1b26 bg=#9ece6a bold] RESIZE ,}#{?#{==:#{client_key_table},move_mode},#[fg=#1a1b26 bg=#e0af68 bold] MOVE ,}#{?#{==:#{client_key_table},session_mode},#[fg=#1a1b26 bg=#f7768e bold] SESSION ,}#[fg=#414868,bg=#1a1b26]#[fg=#a9b1d6,bg=#414868] %Y-%m-%d #[fg=#7aa2f7,bg=#414868]#[fg=#1a1b26,bg=#7aa2f7,bold] %H:%M "
